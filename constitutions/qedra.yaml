schemaVersion: 1.0.0
name: QEDRA Constitution
description: Non-negotiable software laws enforced by deterministic attacks and verification.
invariants:
  - id: TRANSFER_IDEMPOTENCY
    version: 1
    title: Transfer idempotency
    statement: The same transfer request must never debit a wallet more than once, including after a network timeout, client retry, duplicate callback, or concurrent duplicate request.
    severity: critical
    enabled: true
    tags:
      - payments
      - idempotency
      - ledger
    scenario:
      id: transfer-timeout-after-commit-retry
      deterministicSeed: qedra-transfer-idempotency-seed-v1
      description: Commit TX-001, lose the response, and retry the exact request with the same idempotency key.
      attackCommand: node --import tsx packages/cli/src/bin.ts attack TRANSFER_IDEMPOTENCY --target vulnerable --json
      verificationCommand: node --import tsx packages/cli/src/bin.ts verify TRANSFER_IDEMPOTENCY --target fixed --json
      timeoutMs: 30000
      expectedState:
        sourceBalance: 9000
        destinationBalance: 6000
        debitEntries: 1
        creditEntries: 1
  - id: IDEMPOTENCY_KEY_PAYLOAD_BINDING
    version: 1
    title: Idempotency key payload binding
    statement: The same idempotency key must never be accepted for two semantically different transfer requests.
    severity: critical
    enabled: true
    tags:
      - payments
      - idempotency
      - payload-integrity
    scenario:
      id: idempotency-key-payload-conflict
      deterministicSeed: qedra-idempotency-key-payload-binding-seed-v1
      description: Commit TX-001, then reuse its idempotency key with a different amount, destination, and source.
      attackCommand: node --import tsx packages/cli/src/bin.ts attack IDEMPOTENCY_KEY_PAYLOAD_BINDING --target vulnerable --json
      verificationCommand: node --import tsx packages/cli/src/bin.ts verify IDEMPOTENCY_KEY_PAYLOAD_BINDING --target fixed --json
      timeoutMs: 30000
      expectedState:
        sourceBalance: 9000
        destinationBalance: 6000
        alternateDestinationBalance: 2000
        ledgerEntries: 2
        conflictStatusCode: 409
        conflictError: IDEMPOTENCY_KEY_REUSED_WITH_DIFFERENT_PAYLOAD
        identicalRetryStatusCode: 200
